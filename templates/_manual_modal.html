<!-- 관심 키워드 직접 등록 팝업 (홈 화면 "관심 키워드 등록" 버튼 전용). 마이페이지는
     이미 페이지 안에 인라인 폼("+ 새 그룹 등록")이 있어서 이 팝업을 쓰지 않는다.
     _chat_modal.html이 먼저 include되어 있어야 .modal-overlay/.modal/.title-input/
     .modal-buttons 스타일과 onGroupRegistered() 훅을 쓸 수 있다. -->
<div id="manual-modal-overlay" class="modal-overlay" onclick="if (event.target === this) closeManualModal()">
    <div class="modal">
        <h3>관심 키워드 등록</h3>
        <input type="text" id="manual-title-input" class="title-input" placeholder="그룹 제목 (예: LLM 추론 최적화)">
        <input type="text" id="manual-keywords-input" class="manual-keywords-input" placeholder="키워드를 쉼표로 구분해서 입력 (예: RAG, multi-agent)">
        <div class="modal-buttons">
            <button class="btn btn-outline" onclick="closeManualModal()">취소</button>
            <button class="btn btn-kakao" onclick="submitManualGroup()">등록</button>
        </div>
    </div>
</div>

<style>
    .manual-keywords-input {
        width: 100%; padding: 11px 14px; margin-bottom: 4px;
        border: 1px solid var(--border); border-radius: 10px; font-size: 14px;
    }
</style>

<script>
function openManualModal() {
    document.getElementById('manual-title-input').value = '';
    document.getElementById('manual-keywords-input').value = '';
    document.getElementById('manual-modal-overlay').classList.add('open');
    document.getElementById('manual-title-input').focus();
}

function closeManualModal() {
    document.getElementById('manual-modal-overlay').classList.remove('open');
}

async function submitManualGroup() {
    const title = document.getElementById('manual-title-input').value.trim();
    const keywords = document.getElementById('manual-keywords-input').value
        .split(',').map(s => s.trim()).filter(Boolean);
    if (!title || keywords.length === 0) {
        alert('제목과 키워드를 입력해주세요.');
        return;
    }
    const res = await fetch('/api/keyword-groups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, keywords })
    });
    const newGroup = await res.json();
    closeManualModal();
    onGroupRegistered(newGroup);
}
</script>
